services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golo-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3002"
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENABLE_KAFKA: "true"
      KAFKA_BROKERS: "kafka:9092"
      ENABLE_REDIS: "true"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASS:-}
    ports:
      - "3002:3002"
    depends_on:
      - kafka
      - redis
    networks:
      - golo-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:29092"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    # Optional: host-only access to Kafka from the VPS (e.g. for debugging). Containers use `kafka:9092`.
    ports:
      - "127.0.0.1:29092:29092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - golo-net

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD:-}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASS:-}
    volumes:
      - redis_data:/data
    networks:
      - golo-net

volumes:
  kafka_data:
  redis_data:

networks:
  golo-net:
    driver: bridge
